# Canonical DPYC commit-phase CI. dpyc-community is config + Python scripts (no package),
# so it installs the tools directly rather than `pip install -e .[dev]`. Job name `test` +
# matrix ["3.12"] yields the fleet-canonical status context `test (3.12)`, which branch
# protection requires (see scripts/require-ci-checks.sh). Lints the scripts + tests and runs
# the doctrine_lint suite — including the "don't turn yourself off" invariant tests.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install tools
        run: pip install ruff pytest

      - name: Lint
        run: ruff check scripts/ tests/

      - name: Run tests
        run: pytest tests/ -v
