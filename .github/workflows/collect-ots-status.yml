name: Collect OTS Status

on:
  schedule:
    - cron: '17 */1 * * *'  # Every hour at :17
  workflow_dispatch: {}      # Manual trigger

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.ORACLE_PUSH_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install httpx

      - name: Collect OTS status
        run: python scripts/collect-ots-status.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/ots-status.json
          if git diff --cached --quiet; then
            echo "OTS status unchanged"
          else
            git commit -m "[skip ci] Update OTS status"
            git push
          fi
