# DPYC post-merge deploy verification — Role 5, reusable across the MCP operators.
#
# Fires (via a thin per-repo caller) on push to main — i.e. right after a PR merges. Horizon
# redeploys operators automatically from main, but a redeploy can silently fail to take (the
# "stale wheel" class: the service keeps serving old bytes). This agent PROVES the merge is
# actually live: it probes the operator's own *_service_status tool and compares the deployed
# git sha to the sha that just merged.
#
# On a confirmed live deploy it comments the version + sha. On a persistent mismatch (or an
# unreachable service) after Horizon's rebuild window it opens an `agent/fix` issue so the
# Journeyman investigates — fix-forward, the factory's model. It NEVER merges, approves, edits
# code, or pushes; its tools are probe + comment + open-issue only.
name: DPYC Deploy Verify (reusable)

on:
  workflow_call:
    inputs:
      service_url:
        description: >-
          The operator's live MCP endpoint. Defaults to the Horizon pattern
          https://<repo>.fastmcp.app/mcp; override for a custom domain.
        type: string
        default: ""
      model:
        description: Claude model for the verifier (probe + report — sonnet is plenty).
        type: string
        default: claude-sonnet-5
    secrets:
      ANTHROPIC_API_KEY:
        required: true
      DPYC_BOT_APP_ID:
        required: true
      DPYC_BOT_PRIVATE_KEY:
        required: true

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Mint scoped App token
        id: token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.DPYC_BOT_APP_ID }}
          private-key: ${{ secrets.DPYC_BOT_PRIVATE_KEY }}

      - name: Verify the redeploy landed
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.token.outputs.token }}
          allowed_bots: "dpyc-agentic-desk[bot]"
          prompt: |
            A commit just landed on main of ${{ github.repository }}. Confirm that Horizon has
            actually redeployed it to the live service — do not assume a merge means a deploy.

            EXPECTED_SHA (what must be serving): ${{ github.sha }}
            SERVICE_URL: ${{ inputs.service_url != '' && inputs.service_url || format('https://{0}.fastmcp.app/mcp', github.event.repository.name) }}

            HOW TO PROBE (stateless, no auth — service_status is a free tool):
            1. Find the status tool name. It is "<slug>_service_status" (e.g. schwab_service_status).
               If unsure, list tools first:
                 curl -s -m 25 -X POST "$SERVICE_URL" -H 'Content-Type: application/json' \
                   -H 'Accept: application/json, text/event-stream' \
                   -d '{"jsonrpc":"2.0","id":1,"method":"tools/list","params":{}}'
               and pick the name ending in _service_status.
            2. Call it:
                 curl -s -m 25 -X POST "$SERVICE_URL" -H 'Content-Type: application/json' \
                   -H 'Accept: application/json, text/event-stream' \
                   -d '{"jsonrpc":"2.0","id":1,"method":"tools/call","params":{"name":"<slug>_service_status","arguments":{}}}'
               The response is SSE; the JSON you want is in the `data:` line, and the tool's
               payload is the `result.content[0].text` string (parse it as JSON). Read
               build_info.fastmcp_cloud_git_commit_sha (the DEPLOYED sha) and version.

            FIRST — did this merge even change deployable code? Check what the commit touched:
              gh api repos/${{ github.repository }}/commits/${{ github.sha }} --jq '.files[].filename'
            If EVERY changed file is under .github/, docs/, tests/, or is a *.md / CHANGELOG (i.e.
            nothing the server actually deploys), then Horizon has no reason to redeploy and a sha
            mismatch is EXPECTED and FINE. In that case do a single health probe (below), and if the
            service responds, post a short PR comment "no redeploy needed (non-deployable change);
            service healthy at <version>" and STOP. Do NOT open an issue for this case.

            Otherwise (deployable code changed), verify the redeploy:
            - Horizon rebuilds take time. A cold start / "warming up" / a brief non-200 is NORMAL —
              retry with `sleep`. A dependency change triggers a FULL rebuild (~10 min); a code-only
              change is faster. Poll roughly every 60s for up to ~12 minutes before concluding.
            - SUCCESS = build_info.fastmcp_cloud_git_commit_sha == EXPECTED_SHA. When it matches,
              post ONE comment on the PR that introduced this sha (find it:
              `gh pr list --repo ${{ github.repository }} --search "${{ github.sha }}" --state merged`)
              confirming: deployed version + the matching sha. Then STOP — you are done.
            - FAILURE = after the full window the deployed sha is still an OLDER sha (stale wheel),
              or the service stays unreachable. Only then, open ONE issue:
                gh issue create --repo ${{ github.repository }} --label agent/fix \
                  --title "Deploy did not land: still serving <short-old-sha>, expected <short-new-sha>" \
                  --body "<evidence: EXPECTED_SHA, the observed deployed sha + version, the probe
                          output, and that this persisted for ~12 min past the merge. Likely the
                          stale-wheel class (Horizon served cached bytes) — a touch-commit + redeploy
                          usually clears it; the Journeyman should confirm the true cause via a fresh
                          probe.>"
              Do NOT open an issue for a mere cold-start or a transient error — only for a
              persistent sha mismatch after the window. Never open more than one issue.

            You may ONLY probe (curl), read, comment on the PR, and (on real failure) open the
            issue. Do not merge, approve, edit code, or push anything.
          claude_args: |
            --model ${{ inputs.model }}
            --max-turns 40
            --allowedTools "Bash(curl:*),Bash(sleep:*),Bash(gh pr list:*),Bash(gh pr comment:*),Bash(gh pr view:*),Bash(gh issue create:*),Bash(gh issue list:*),Bash(gh issue view:*),Bash(gh api:*),Read,Grep"
