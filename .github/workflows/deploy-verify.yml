# DPYC post-merge deploy verification — Role 5, reusable across the MCP operators.
#
# Fires (via a thin per-repo caller) on push to main — right after a PR merges. Horizon
# redeploys operators automatically, but a redeploy can silently fail to take (the "stale
# wheel" class: the service keeps serving old bytes). This job PROVES the merge went live by
# probing the operator's own *_service_status tool and comparing the DEPLOYED git sha
# (build_info.fastmcp_cloud_git_commit_sha) to the sha that just merged.
#
# Deterministic on purpose: claude-code-action does not support the `push` event, and an exact
# sha comparison needs no judgement. The AWARE half is the repair — a persistent stale/broken
# deploy opens an `agent/fix` issue, which the Journeyman (Engineering) picks up and fixes
# forward. This job only probes, comments, and (on real failure) opens one issue — no merge,
# approve, edit, or push.
name: DPYC Deploy Verify (reusable)

on:
  workflow_call:
    inputs:
      service_url:
        description: >-
          The operator's live MCP endpoint. Defaults to the Horizon pattern
          https://<repo>.fastmcp.app/mcp; override for a custom domain.
        type: string
        default: ""
      poll_minutes:
        description: How long to wait for Horizon to redeploy before flagging a stale deploy.
        type: number
        default: 12
    secrets:
      DPYC_BOT_APP_ID:
        required: true
      DPYC_BOT_PRIVATE_KEY:
        required: true

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Mint scoped App token
        id: token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.DPYC_BOT_APP_ID }}
          private-key: ${{ secrets.DPYC_BOT_PRIVATE_KEY }}

      - name: Probe the live service and verify the redeploy
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          REPO: ${{ github.repository }}
          REPO_NAME: ${{ github.event.repository.name }}
          EXPECTED_SHA: ${{ github.sha }}
          SERVICE_URL_IN: ${{ inputs.service_url }}
          POLL_MINUTES: ${{ inputs.poll_minutes }}
        run: |
          set -uo pipefail
          SERVICE_URL="${SERVICE_URL_IN:-}"
          [ -z "$SERVICE_URL" ] && SERVICE_URL="https://${REPO_NAME}.fastmcp.app/mcp"
          echo "Service: $SERVICE_URL   Expected sha: $EXPECTED_SHA"

          # --- did this merge change deployable code? -------------------------------------
          # A change confined to .github/, docs/, tests/, or *.md / CHANGELOG doesn't redeploy;
          # a sha mismatch there is EXPECTED, not a failure.
          files="$(gh api "repos/$REPO/commits/$EXPECTED_SHA" --jq '.files[].filename' 2>/dev/null)"
          deployable=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            if printf '%s\n' "$f" | grep -Eqv '^(\.github/|docs/|tests/)|(^|/)(README|CHANGELOG)|\.md$'; then
              deployable=1
            fi
          done <<< "$files"
          echo "Deployable code changed: $deployable"

          # --- probe helpers ---------------------------------------------------------------
          # The MCP status tool is named differently per operator (schwab_service_status,
          # weather_service_status, or bare service_status), so DISCOVER it from tools/list
          # rather than guess a slug. Responses are SSE; the tool payload is the JSON string at
          # result.content[0].text (parsed with jq's fromjson). jq ships on every runner.
          discover_tool() {
            curl -s -m 25 -X POST "$SERVICE_URL" \
              -H 'Content-Type: application/json' \
              -H 'Accept: application/json, text/event-stream' \
              -d '{"jsonrpc":"2.0","id":1,"method":"tools/list","params":{}}' 2>/dev/null \
              | sed -n 's/^data: //p' \
              | jq -r '.result.tools[].name | select(endswith("service_status"))' 2>/dev/null | head -1
          }
          probe() {  # $1 = full status-tool name; echoes "<deployed_sha> <version>" or empty
            [ -z "$1" ] && return
            local body raw text sha ver
            body='{"jsonrpc":"2.0","id":1,"method":"tools/call","params":{"name":"'"$1"'","arguments":{}}}'
            raw="$(curl -s -m 25 -X POST "$SERVICE_URL" \
              -H 'Content-Type: application/json' \
              -H 'Accept: application/json, text/event-stream' \
              -d "$body" 2>/dev/null)"
            text="$(printf '%s\n' "$raw" | sed -n 's/^data: //p' \
              | jq -r '.result.content[0].text // empty' 2>/dev/null | head -1)"
            [ -z "$text" ] && return
            sha="$(printf '%s' "$text" | jq -r '.build_info.fastmcp_cloud_git_commit_sha // ""' 2>/dev/null)"
            ver="$(printf '%s' "$text" | jq -r '.version // ""' 2>/dev/null)"
            printf '%s %s' "$sha" "$ver"
          }

          deadline=$(( $(date +%s) + POLL_MINUTES*60 ))
          deployed_sha=""; version=""; status_tool=""
          while :; do
            [ -z "$status_tool" ] && status_tool="$(discover_tool)"
            read -r deployed_sha version <<< "$(probe "$status_tool")"
            echo "  probe -> sha='${deployed_sha:0:12}' version='${version}'"
            if [ "$deployable" = "0" ] && [ -n "$version" ]; then
              break  # non-deployable change + service healthy = done
            fi
            if [ -n "$deployed_sha" ] && [ "$deployed_sha" = "$EXPECTED_SHA" ]; then
              break  # deploy landed
            fi
            [ "$(date +%s)" -ge "$deadline" ] && break
            echo "  not yet (cold start / rebuilding) — waiting 60s"
            sleep 60
          done

          PR="$(gh api "repos/$REPO/commits/$EXPECTED_SHA/pulls" --jq '.[0].number' 2>/dev/null)"
          short_new="${EXPECTED_SHA:0:8}"; short_dep="${deployed_sha:0:8}"

          if [ "$deployable" = "0" ] && [ -n "$version" ]; then
            msg="✅ No redeploy needed (non-deployable change). Service healthy at version ${version}."
            echo "$msg"
            [ -n "$PR" ] && gh pr comment "$PR" --repo "$REPO" --body "$msg" || true
            exit 0
          fi

          if [ -n "$deployed_sha" ] && [ "$deployed_sha" = "$EXPECTED_SHA" ]; then
            msg="✅ Deploy verified live: version ${version}, serving \`${short_new}\` (matches the merge)."
            echo "$msg"
            [ -n "$PR" ] && gh pr comment "$PR" --repo "$REPO" --body "$msg" || true
            exit 0
          fi

          # Service is up (reports a version) but does not expose a deployed git sha — older SDK.
          # We cannot confirm the exact commit, but a healthy service is NOT a failed deploy: note
          # it and do NOT open an issue (a false alarm would be worse than a missing confirmation).
          if [ -n "$version" ] && [ -z "$deployed_sha" ]; then
            msg="ℹ️ Service healthy at version ${version}, but it does not report a deployed commit sha (older SDK) — cannot confirm the exact live commit. No action."
            echo "$msg"
            [ -n "$PR" ] && gh pr comment "$PR" --repo "$REPO" --body "$msg" || true
            exit 0
          fi

          # Persistent mismatch or unreachable after the window → open ONE agent/fix issue.
          title="Deploy did not land: serving ${short_dep:-<unreachable>}, expected ${short_new}"
          body="Horizon has not served the merged commit after ~${POLL_MINUTES} min.

          - Expected (merged) sha: \`${EXPECTED_SHA}\`
          - Observed deployed sha: \`${deployed_sha:-<none — service unreachable>}\`
          - Observed version: \`${version:-<none>}\`
          - Service: ${SERVICE_URL}

          This is the stale-wheel class (Horizon serving cached bytes) or a failed rebuild. A
          touch-commit + redeploy usually clears a stale wheel; confirm the true live cause with a
          fresh stateless \`*_service_status\` probe before changing code."
          # Ensure the label exists, then file the issue for the Journeyman.
          gh label create agent/fix --repo "$REPO" --color d73a4a --force >/dev/null 2>&1 || true
          gh issue create --repo "$REPO" --label agent/fix --title "$title" --body "$body"
          echo "Opened agent/fix issue for a stale/failed deploy."
