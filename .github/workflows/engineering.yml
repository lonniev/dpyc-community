# DPYC Agentic Engineering — Role 2 (fix + PR), reusable across the fleet.
#
# Fires (via a thin per-repo caller) on issues.labeled == agent/fix. Reproduces,
# implements the MINIMAL fix, adds a test, pushes a branch, and opens a PR that
# closes the issue. QA (Role 3) reviews the PR; auto-merge.yml handles path-gated
# landing. The action only commits/pushes — it never merges, rebases, or force-pushes.
#
# The app token is scoped to THIS repo only: Engineering never writes code to another
# repo. If it discovers the fix actually belongs upstream, it does NOT patch locally —
# it re-routes exactly like the Service Desk (blocked/upstream + escalation comment).
name: DPYC Engineering (reusable)

on:
  workflow_call:
    inputs:
      model:
        description: Claude model for implementation.
        type: string
        default: claude-opus-4-8
      ref:
        description: dpyc-community ref to fetch the Journeyman prompt from.
        type: string
        default: main
    secrets:
      ANTHROPIC_API_KEY:
        required: true
      DPYC_BOT_APP_ID:
        required: true
      DPYC_BOT_PRIVATE_KEY:
        required: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  implement:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mint scoped App token
        id: token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.DPYC_BOT_APP_ID }}
          private-key: ${{ secrets.DPYC_BOT_PRIVATE_KEY }}

      # The Journeyman's signing hand: lets the agent record its rationale to the memory
      # graph under its own Nostr identity. The nsec lives only in the keyring subprocess's
      # env (the --mcp-config block below), never in the agent's shell.
      - name: Install the agent keyring
        run: python -m pip install --quiet "tollbooth-dpyc[keyring]==0.63.1"

      # The Journeyman's behavior lives in factory/journeyman.prompt.md (the agent may evolve
      # it via PR; the workflow skeleton — permissions, token, tools — stays human-only). We
      # fetch it from dpyc-community (this reusable workflow's checkout is the CALLER's repo)
      # and fill only the three named GitHub-context placeholders. envsubst's restricted form
      # touches nothing else in the file.
      - name: Render the Journeyman prompt
        id: prompt
        env:
          REPO: ${{ github.repository }}
          REPO_NAME: ${{ github.event.repository.name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          curl -fsSL \
            "https://raw.githubusercontent.com/lonniev/dpyc-community/${{ inputs.ref }}/factory/journeyman.prompt.md" \
            -o /tmp/journeyman.prompt.md
          rendered=$(envsubst '${REPO} ${REPO_NAME} ${ISSUE_NUMBER}' < /tmp/journeyman.prompt.md)
          { echo 'text<<PROMPT_EOF'; echo "$rendered"; echo 'PROMPT_EOF'; } >> "$GITHUB_OUTPUT"

      - name: Implement the fix and open a PR
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.token.outputs.token }}
          # The whole pipeline is bot-triggered (labels written by our App), so the
          # action must accept our bot as the initiating actor. The label guard on the
          # caller (agent/fix only) is the real gate on what runs.
          allowed_bots: "dpyc-agentic-desk[bot]"
          prompt: ${{ steps.prompt.outputs.text }}
          claude_args: |
            --model ${{ inputs.model }}
            --max-turns 70
            --mcp-config '{"mcpServers":{"graph":{"type":"stdio","command":"python","args":["-m","tollbooth.agent_keyring"],"env":{"DPYC_KEYRING_UPSTREAM":"https://cypher-mcp.fastmcp.app/mcp","DPYC_KEYRING_NPUB":"npub1m5quz5w0e96t36s7qw9tgnk90n0r0l2gxra75px4qnlu08lwaqnsskw7rk","DPYC_KEYRING_NSEC":"${{ secrets.JOURNEYMAN_NSEC }}"}}}}'
            --allowedTools "Bash(gh issue view:*),Bash(gh issue edit:*),Bash(gh issue comment:*),Bash(gh pr create:*),Bash(git:*),Bash(pytest:*),Bash(ruff:*),Bash(pip:*),Bash(python:*),Edit,Write,Read,Glob,Grep,mcp__graph__cypher_record_triage,mcp__graph__cypher_assert_rationale,mcp__graph__cypher_bind_rationale_to_symbol"
