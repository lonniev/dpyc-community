# DPYC Agentic Engineering — Role 2 (fix + PR), reusable across the fleet.
#
# Fires (via a thin per-repo caller) on issues.labeled == agent/fix. Reproduces,
# implements the MINIMAL fix, adds a test, pushes a branch, and opens a PR that
# closes the issue. QA (Role 3) reviews the PR; auto-merge.yml handles path-gated
# landing. The action only commits/pushes — it never merges, rebases, or force-pushes.
#
# The app token is scoped to THIS repo only: Engineering never writes code to another
# repo. If it discovers the fix actually belongs upstream, it does NOT patch locally —
# it re-routes exactly like the Service Desk (blocked/upstream + escalation comment).
name: DPYC Engineering (reusable)

on:
  workflow_call:
    inputs:
      model:
        description: Claude model for implementation.
        type: string
        default: claude-opus-4-8
      ref:
        description: dpyc-community ref to fetch the Journeyman prompt from.
        type: string
        default: main
    secrets:
      ANTHROPIC_API_KEY:
        required: true
      DPYC_BOT_APP_ID:
        required: true
      DPYC_BOT_PRIVATE_KEY:
        required: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  # Detect the target repo's toolchain so the implement job runs on the right OS.
  # Xcode/iPadOS projects need macOS + Xcode; everything else builds on ubuntu. macOS
  # runners bill ~10x ubuntu minutes, so this gate keeps macOS to repos that actually need it.
  # Callers stay identical (thin) — the language is auto-detected here, not declared per repo.
  detect:
    runs-on: ubuntu-latest
    outputs:
      runner: ${{ steps.stack.outputs.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect toolchain and pick the runner OS
        id: stack
        run: |
          if find . -maxdepth 3 \( -name '*.xcodeproj' -o -name '*.xcworkspace' -o -name 'Package.swift' \) -print -quit | grep -q .; then
            echo "runner=macos-latest" >> "$GITHUB_OUTPUT"; echo "Xcode/Swift project detected -> macos-latest"
          else
            echo "runner=ubuntu-latest" >> "$GITHUB_OUTPUT"; echo "no Xcode/Swift project -> ubuntu-latest"
          fi

  implement:
    needs: detect
    runs-on: ${{ needs.detect.outputs.runner }}
    steps:
      # Deterministic, before the LLM runs: a visible "an agent is on it" signal, present
      # exactly while this run is live. The clear step at the end (always()) removes it on
      # any ending, so the agent never has to remember to tidy up — and a stale agent/working
      # that outlives its run is itself the "the run hung" tell. github.token is enough
      # (issues: write) and its label writes don't trigger further workflows.
      - name: Mark the issue agent/working
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue edit ${{ github.event.issue.number }} --repo ${{ github.repository }} --add-label agent/working || true

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Guarantee `python` + pip exist on BOTH ubuntu and macOS runners — the keyring
      # install and the graph MCP's `command: python` below both invoke bare `python`,
      # which macOS runners do not provide by default.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Mint scoped App token
        id: token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.DPYC_BOT_APP_ID }}
          private-key: ${{ secrets.DPYC_BOT_PRIVATE_KEY }}

      # The Journeyman's signing hand: lets the agent record its rationale to the memory
      # graph under its own Nostr identity. The nsec lives only in the keyring subprocess's
      # env (the --mcp-config block below), never in the agent's shell.
      - name: Install the agent keyring
        run: python -m pip install --quiet "tollbooth-dpyc[keyring]==0.63.1"

      # The Journeyman's behavior lives in factory/journeyman.prompt.md (the agent may evolve
      # it via PR; the workflow skeleton — permissions, token, tools — stays human-only). We
      # fetch it from dpyc-community (this reusable workflow's checkout is the CALLER's repo)
      # and fill only the three named GitHub-context placeholders. envsubst's restricted form
      # touches nothing else in the file.
      - name: Render the Journeyman prompt
        id: prompt
        env:
          REPO: ${{ github.repository }}
          REPO_NAME: ${{ github.event.repository.name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          curl -fsSL \
            "https://raw.githubusercontent.com/lonniev/dpyc-community/${{ inputs.ref }}/factory/journeyman.prompt.md" \
            -o /tmp/journeyman.prompt.md
          rendered=$(envsubst '${REPO} ${REPO_NAME} ${ISSUE_NUMBER}' < /tmp/journeyman.prompt.md)
          { echo 'text<<PROMPT_EOF'; echo "$rendered"; echo 'PROMPT_EOF'; } >> "$GITHUB_OUTPUT"

      - name: Implement the fix and open a PR
        id: implement
        uses: anthropics/claude-code-action@v1.0.179  # pinned: v1.0.180+ broke the bash sandbox (bwrap "/home/.mcp.json" denied); floating @v1 regressed the whole factory
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.token.outputs.token }}
          # The whole pipeline is bot-triggered (labels written by our App), so the
          # action must accept our bot as the initiating actor. The label guard on the
          # caller (agent/fix only) is the real gate on what runs.
          allowed_bots: "dpyc-agentic-desk[bot]"
          prompt: ${{ steps.prompt.outputs.text }}
          claude_args: |
            --model ${{ inputs.model }}
            --max-turns 70
            --mcp-config '{"mcpServers":{"graph":{"type":"stdio","command":"python","args":["-m","tollbooth.agent_keyring"],"env":{"DPYC_KEYRING_UPSTREAM":"https://cypher-mcp.fastmcp.app/mcp","DPYC_KEYRING_NPUB":"npub1m5quz5w0e96t36s7qw9tgnk90n0r0l2gxra75px4qnlu08lwaqnsskw7rk","DPYC_KEYRING_NSEC":"${{ secrets.JOURNEYMAN_NSEC }}"}}}}'
            # Verbs the Journeyman may run to do and PROVE a fix. The build set
            # (swift/xcodebuild/xcrun/pytest/…) plus the macOS/Xcode support verbs a real
            # simulator-boot + xcodebuild-test flow reaches for on a fresh runner: selecting
            # the toolchain, booting the Simulator, installing missing tooling, and the
            # ruby/bundle/xcodeproj path that registers a new test file in the .pbxproj. Plus
            # the everyday file-inspection/plumbing verbs. Deliberately bounded to read/build/
            # project-file work — NO curl, bash -c, eval, or rm — so a prompt-injected issue
            # still cannot reach the network or destroy the tree.
            --allowedTools "Bash(gh issue view:*),Bash(gh repo view:*),Bash(gh issue edit:*),Bash(gh issue comment:*),Bash(gh issue close:*),Bash(gh pr create:*),Bash(git:*),Bash(pytest:*),Bash(ruff:*),Bash(mypy:*),Bash(uv:*),Bash(pip:*),Bash(python:*),Bash(python3:*),Bash(swift:*),Bash(xcodebuild:*),Bash(xcrun:*),Bash(xcode-select:*),Bash(open:*),Bash(defaults:*),Bash(brew:*),Bash(ruby:*),Bash(gem:*),Bash(bundle:*),Bash(sw_vers:*),Bash(sysctl:*),Bash(npm:*),Bash(npx:*),Bash(node:*),Bash(make:*),Bash(ls:*),Bash(cat:*),Bash(find:*),Bash(mkdir:*),Bash(cp:*),Bash(mv:*),Bash(sed:*),Edit,Write,Read,Glob,Grep,mcp__graph__cypher_which_service_handles,mcp__graph__cypher_explain_capability,mcp__graph__cypher_list_capabilities,mcp__graph__cypher_record_triage,mcp__graph__cypher_assert_rationale,mcp__graph__cypher_bind_rationale_to_symbol,mcp__graph__cypher_upsert_capability,mcp__graph__cypher_bind_capability_to_symbol,mcp__graph__cypher_suggest_capability_why,mcp__graph__cypher_link_pr,mcp__graph__cypher_context_pack,mcp__graph__cypher_anchor_symbol,mcp__graph__cypher_route_rejection,mcp__graph__cypher_claim_issue"

      # If the fix run died because the shared key is exhausted/capped, tag the issue
      # awaiting-funds so it re-runs on recovery instead of silently stalling with no PR.
      # The issue keeps its agent/fix label, which is how the canary knows to re-fire
      # ENGINEERING (not Porter) on recovery. Deterministic; matches only the credit signature.
      - name: Flag a funding outage (deterministic)
        if: ${{ failure() && steps.token.outputs.token != '' }}
        uses: lonniev/dpyc-community/factory/actions/funding-sentinel@main
        with:
          target: ${{ github.event.issue.number }}
          kind: issue
          gh-token: ${{ steps.token.outputs.token }}

      # Clear the working signal on ANY ending — PR opened, no-change close, or a fast-fail
      # (the funding step above has already tagged that one awaiting-funds). Only a genuine
      # hang skips this, leaving agent/working on as the stuck tell.
      - name: Clear agent/working when the run ends
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue edit ${{ github.event.issue.number }} --repo ${{ github.repository }} --remove-label agent/working || true
