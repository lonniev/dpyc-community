# DPYC cross-repo escalation — deterministic, NO agent, issues-only.
#
# Fires (via a thin per-repo caller) on issues.labeled == blocked/upstream. Reads the
# structured <!-- dpyc-escalation --> comment left by the Service Desk / Engineering
# agent, validates the named home repo against an allowlist, and opens a linked
# agent/fix issue in that home repo — where its OWN pipeline picks it up.
#
# This is the ONLY workflow that writes across repositories, and its App token is
# downscoped to issues:write ONLY (no contents, no PRs) across the account. No LLM
# runs here: the escalation comment is authored by a trusted agent and its home_repo
# is checked against a fixed allowlist before any cross-repo write. That confines the
# blast radius of the account-wide token to "can file issues", never "can change code".
name: DPYC Escalation (reusable)

on:
  workflow_call:
    secrets:
      DPYC_BOT_APP_ID:
        required: true
      DPYC_BOT_PRIVATE_KEY:
        required: true

permissions:
  issues: write

jobs:
  escalate:
    runs-on: ubuntu-latest
    steps:
      # Account-wide token, but ONLY issues:write. Cannot touch code in any repo.
      - name: Mint issues-only account-wide token
        id: token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.DPYC_BOT_APP_ID }}
          private-key: ${{ secrets.DPYC_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-issues: write

      - name: Route to the home repo
        if: github.event.label.name == 'blocked/upstream'
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          OWNER: ${{ github.repository_owner }}
          ORIGIN_REPO: ${{ github.repository }}
          ISSUE: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail

          # Allowlist of DPYC repos that may receive an escalated issue.
          allow="tollbooth-dpyc schwab-mcp thebrain-mcp excalibur-mcp cypher-mcp optionality-mcp taxsort-mcp tollbooth-authority tollbooth-authority-newengland tollbooth-authority-northamerica tollbooth-wasmcp tollbooth-fermyon dpyc-oracle tollbooth-sample tollbooth-oauth2-collector tollbooth-shortlinks tollbooth-pricing-studio pricing-studio"

          # Idempotency: if we already escalated this issue, stop.
          if gh issue view "$ISSUE" --repo "$ORIGIN_REPO" --json comments \
               --jq '.comments[].body' | grep -q '<!-- dpyc-escalated -->'; then
            echo "Already escalated; nothing to do."
            exit 0
          fi

          # Pull the newest structured escalation block from the issue's comments.
          body=$(gh issue view "$ISSUE" --repo "$ORIGIN_REPO" --json comments \
                   --jq '[.comments[].body | select(contains("<!-- dpyc-escalation -->"))] | last // ""')
          if [ -z "$body" ]; then
            echo "No <!-- dpyc-escalation --> comment found; cannot route. Leaving for a human."
            exit 0
          fi

          get() { printf '%s\n' "$body" | grep -m1 -E "^$1:" | sed -E "s/^$1:[[:space:]]*//"; }
          home_repo=$(get home_repo)
          up_title=$(get title)
          reason=$(get reason)
          repro=$(get repro)

          if [ -z "$home_repo" ]; then
            echo "escalation comment missing home_repo; leaving for a human."
            exit 0
          fi
          # Validate against the allowlist (word-boundary match).
          case " $allow " in
            *" $home_repo "*) : ;;
            *) echo "home_repo '$home_repo' not in allowlist; refusing to route."; exit 1 ;;
          esac
          if [ "$home_repo" = "${ORIGIN_REPO#*/}" ]; then
            echo "home_repo equals origin; not a cross-repo escalation. Skipping."
            exit 0
          fi

          [ -z "$up_title" ] && up_title="Escalated from ${ORIGIN_REPO}#${ISSUE}"

          # The home repo may not carry the DPYC label taxonomy yet — ensure the one
          # label we attach exists so gh issue create doesn't fail on an unknown label.
          gh label create "agent/fix" --repo "$OWNER/$home_repo" --color 5319e7 \
            --description "Handed to the Engineering agent" --force >/dev/null 2>&1 || true

          new_body=$(cat <<EOF
          Escalated automatically from ${ORIGIN_REPO}#${ISSUE}.

          **Why this repo:** ${reason:-(diagnosed as owning the fix)}

          **Reproduction:** ${repro:-see origin issue}

          Origin: https://github.com/${ORIGIN_REPO}/issues/${ISSUE}

          <!-- dpyc-escalated-child -->
          EOF
          )

          url=$(gh issue create --repo "$OWNER/$home_repo" \
                  --title "$up_title" \
                  --body "$new_body" \
                  --label "agent/fix")
          echo "Opened upstream issue: $url"

          gh issue comment "$ISSUE" --repo "$ORIGIN_REPO" --body \
            "$(printf '<!-- dpyc-escalated -->\nRouted upstream to %s — the home repo owns this fix per the DPYC DRY boundaries. This issue stays open (blocked/upstream) and closes when the upstream fix propagates.' "$url")"

      # ── Reverse path — the anti-ping-pong loop ────────────────────────────
      # When a TARGET repo declines an escalated child (label rejected/upstream),
      # route the reason BACK to the origin and reactivate its Porter — but never
      # let the same issue oscillate: a repeat repo or 3+ hops freezes it for a
      # human instead of bouncing. This is the only way a rejection reaches the
      # origin's re-triage, so the origin can pick a DIFFERENT home on its own.
      - name: Route rejection back to origin
        if: github.event.label.name == 'rejected/upstream'
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          OWNER: ${{ github.repository_owner }}
          CHILD_REPO: ${{ github.repository }}
          CHILD: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          child_short="${CHILD_REPO#*/}"

          # Only escalated children route back; a normal rejected issue does not.
          childbody=$(gh issue view "$CHILD" --repo "$CHILD_REPO" --json body --jq '.body')
          if ! printf '%s' "$childbody" | grep -q '<!-- dpyc-escalated-child -->'; then
            echo "Not an escalated child; nothing to route back."
            exit 0
          fi

          # Parse the Origin: backlink the forward path stamped into the child body.
          origin_url=$(printf '%s\n' "$childbody" | grep -m1 -E '^Origin:[[:space:]]' | sed -E 's#^Origin:[[:space:]]*##')
          origin_path=$(printf '%s' "$origin_url" | sed -E 's#https?://github.com/##; s#/issues/# #')
          origin_repo=$(printf '%s' "$origin_path" | awk '{print $1}')
          origin_num=$(printf '%s' "$origin_path" | awk '{print $2}')
          if [ -z "$origin_repo" ] || [ -z "$origin_num" ]; then
            echo "Could not parse Origin backlink; leaving for a human."
            exit 0
          fi

          # The decline reason: newest <!-- dpyc-rejection --> comment on the child.
          reason=$(gh issue view "$CHILD" --repo "$CHILD_REPO" --json comments \
                     --jq '[.comments[].body | select(contains("<!-- dpyc-rejection -->"))] | last // ""' \
                     | sed -E 's/<!--[^>]*-->//g' | tr -s '[:space:]' ' ' | sed -E 's/^ +| +$//g')
          [ -n "$reason" ] || reason="(no reason given)"

          # Route-history marker on the origin — which repos have already declined.
          hist=$(gh issue view "$origin_num" --repo "$origin_repo" --json body,comments \
                   --jq '[.body] + [.comments[].body] | map(select(contains("dpyc-route-history:"))) | last // ""' \
                   | sed -nE 's/.*dpyc-route-history:[[:space:]]*([A-Za-z0-9,._-]*).*/\1/p')
          case ",$hist," in *",$child_short,"*) repeat=1 ;; *) repeat=0 ;; esac
          newhist="${hist:+$hist,}$child_short"
          hops=$(printf '%s' "$newhist" | tr ',' '\n' | grep -c .)

          # Always: post the reason back on the origin and close the handled child.
          gh issue comment "$origin_num" --repo "$origin_repo" --body \
            "$(printf '<!-- dpyc-route-back -->\n**%s declined** this escalation:\n\n> %s\n\n<!-- dpyc-route-history: %s -->' "$child_short" "$reason" "$newhist")"
          gh issue close "$CHILD" --repo "$CHILD_REPO" --reason "not planned" >/dev/null 2>&1 || true

          if [ "$repeat" = "1" ] || [ "$hops" -ge 3 ]; then
            # Ping-pong: freeze for a human. Never bounce again.
            gh label create "blocked/arbitration" --repo "$origin_repo" --color b60205 \
              --description "Routing standoff — two repos disagree; a human must decide" --force >/dev/null 2>&1 || true
            gh issue reopen "$origin_num" --repo "$origin_repo" >/dev/null 2>&1 || true
            gh issue edit "$origin_num" --repo "$origin_repo" \
              --remove-label "blocked/upstream" --add-label "blocked/arbitration" >/dev/null 2>&1 || true
            gh issue comment "$origin_num" --repo "$origin_repo" --body \
              "$(printf '<!-- dpyc-arbitration -->\n@%s — routing standoff after %s hops (%s). The repos disagree on ownership; a human should decide the home.' "$OWNER" "$hops" "$newhist")"
          else
            # Reactivate the origin Porter WITH the reason now on the issue.
            gh label create "agent/retriage" --repo "$origin_repo" --color 5319e7 \
              --description "Replay marker: re-fire Porter" --force >/dev/null 2>&1 || true
            gh issue reopen "$origin_num" --repo "$origin_repo" >/dev/null 2>&1 || true
            gh issue edit "$origin_num" --repo "$origin_repo" --remove-label "blocked/upstream" >/dev/null 2>&1 || true
            gh issue edit "$origin_num" --repo "$origin_repo" --add-label "agent/retriage" >/dev/null 2>&1 || true
          fi
