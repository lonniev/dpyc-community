name: Generate Patent PDFs

on:
  push:
    branches: [main]
    paths:
      - "docs/patent/*.md"
      - "docs/patent/*.svg"

permissions:
  contents: write

jobs:
  build-pdfs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install pandoc, LaTeX, and rsvg-convert
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-latex-recommended texlive-fonts-recommended texlive-latex-extra lmodern librsvg2-bin python3-pip
          pip install --quiet pypdf

      - name: Generate PDFs from patent markdown
        run: |
          cd docs/patent
          for md in PROVISIONAL-SPEC-DRAFT.md COVER-MEMO.md REFERENCE-NUMERAL-SCHEDULE.md; do
            pdf="${md%.md}.pdf"
            echo "Converting $md -> $pdf"
            pandoc "$md" \
              -o "$pdf" \
              --pdf-engine=pdflatex \
              -V geometry:margin=1in \
              -V fontsize=11pt \
              -V mainfont="Latin Modern Roman" \
              -V documentclass=article \
              --toc \
              --number-sections \
              -V colorlinks=true \
              -V linkcolor=blue
          done

      - name: Regenerate figures PDF from SVGs
        run: |
          cd docs/patent
          for svg in FIG-1-*.svg FIG-2-*.svg FIG-3-*.svg FIG-4-*.svg FIG-5-*.svg FIG-6-*.svg; do
            rsvg-convert -f pdf "$svg" -o "${svg%.svg}.pdf"
          done
          python3 -c "
          from pypdf import PdfWriter
          import glob, re
          writer = PdfWriter()
          for i in range(1, 7):
              matches = sorted(glob.glob(f'FIG-{i}-*.pdf'))
              if matches:
                  writer.append(matches[0])
          writer.write('PATENT-FIGURES-ALL.pdf')
          "
          rm -f FIG-*-*.pdf
          echo "Regenerated PATENT-FIGURES-ALL.pdf"

      - name: Commit PDFs if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/patent/*.pdf
          if git diff --cached --quiet; then
            echo "No PDF changes to commit"
          else
            git commit -m "ci: regenerate patent PDFs from markdown"
            git push
          fi
