name: Generate Patent PDFs

on:
  push:
    branches: [main]
    paths:
      - "docs/patent/*.md"
      - "docs/patent/*.svg"

permissions:
  contents: write

jobs:
  build-pdfs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install pandoc, LaTeX, and rsvg-convert
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended texlive-latex-extra fonts-lmodern librsvg2-bin python3-pip
          pip install --quiet pypdf

      # Step 1: SVGs → PATENT-FIGURES-ALL.pdf
      - name: Regenerate figures PDF from SVGs
        run: |
          cd docs/patent
          for svg in FIG-1-*.svg FIG-2-*.svg FIG-3-*.svg FIG-4-*.svg FIG-5-*.svg FIG-6-*.svg; do
            rsvg-convert -f pdf "$svg" -o "${svg%.svg}.pdf"
          done
          python3 -c "
          from pypdf import PdfWriter
          import glob
          writer = PdfWriter()
          for i in range(1, 7):
              matches = sorted(glob.glob(f'FIG-{i}-*.pdf'))
              if matches:
                  writer.append(matches[0])
          writer.write('PATENT-FIGURES-ALL.pdf')
          "
          rm -f FIG-*-*.pdf
          echo "Regenerated PATENT-FIGURES-ALL.pdf"

      # Step 2: MDs → individual PDFs
      - name: Generate PDFs from patent markdown
        run: |
          cd docs/patent
          for md in PROVISIONAL-SPEC-DRAFT.md COVER-MEMO.md REFERENCE-NUMERAL-SCHEDULE.md; do
            pdf="${md%.md}.pdf"
            echo "Converting $md -> $pdf"
            pandoc "$md" \
              -o "$pdf" \
              --pdf-engine=xelatex \
              -V geometry:margin=1in \
              -V geometry:letterpaper \
              -V fontsize=12pt \
              -V mainfont="DejaVu Serif" \
              -V monofont="DejaVu Sans Mono" \
              -V documentclass=article \
              --toc \
              --number-sections \
              -V colorlinks=false \
              -V urlcolor=black \
              -V linkcolor=black
          done

      # Step 3: Concat → FILING-PACKAGE.pdf (depends on steps 1 and 2)
      - name: Generate consolidated filing package
        run: |
          cd docs/patent
          python3 -c "
          from pypdf import PdfWriter
          writer = PdfWriter()
          for pdf in ['SB16-FILLED.pdf', 'SB15A-FILLED.pdf', 'PROVISIONAL-SPEC-DRAFT.pdf', 'PATENT-FIGURES-ALL.pdf']:
              try:
                  writer.append(pdf)
              except FileNotFoundError:
                  print(f'Skipping {pdf} (not found)')
          if len(writer.pages) > 0:
              writer.write('FILING-PACKAGE.pdf')
              print(f'FILING-PACKAGE.pdf: {len(writer.pages)} pages')
          "

      - name: Open PR with regenerated PDFs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/patent/*.pdf
          if git diff --cached --quiet; then
            echo "No PDF changes to commit"
          else
            BRANCH="ci/patent-pdfs-$(date +%Y%m%d-%H%M%S)"
            git checkout -b "$BRANCH"
            git commit -m "ci: regenerate patent PDFs from markdown"
            git push origin "$BRANCH"
            gh pr create \
              --title "ci: regenerate patent PDFs" \
              --body "Auto-generated from patent markdown and SVG changes on main." \
              --base main \
              --head "$BRANCH"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
