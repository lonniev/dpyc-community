name: Generate Patent PDFs

on:
  push:
    branches: [main]
    paths:
      - "docs/patent/*.md"

permissions:
  contents: write

jobs:
  build-pdfs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install pandoc and LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-latex-recommended texlive-fonts-recommended texlive-latex-extra lmodern

      - name: Generate PDFs from patent markdown
        run: |
          cd docs/patent
          for md in PROVISIONAL-SPEC-DRAFT.md COVER-MEMO.md REFERENCE-NUMERAL-SCHEDULE.md; do
            pdf="${md%.md}.pdf"
            echo "Converting $md -> $pdf"
            pandoc "$md" \
              -o "$pdf" \
              --pdf-engine=pdflatex \
              -V geometry:margin=1in \
              -V fontsize=11pt \
              -V mainfont="Latin Modern Roman" \
              -V documentclass=article \
              --toc \
              --number-sections \
              -V colorlinks=true \
              -V linkcolor=blue
          done

      - name: Commit PDFs if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/patent/*.pdf
          if git diff --cached --quiet; then
            echo "No PDF changes to commit"
          else
            git commit -m "ci: regenerate patent PDFs from markdown"
            git push
          fi
