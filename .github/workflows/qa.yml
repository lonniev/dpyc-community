# DPYC Agentic QA — Role 3 (adversarial review), reusable across the fleet.
#
# Fires (via a thin per-repo caller, guarded to bot-authored agent/fix-* PRs) on
# pull_request. Reviews the PR in a FRESH context — it did not write the code —
# and applies qa/pass or qa/flag with a review comment.
#
# QA judges SEMANTICS: does the diff actually fix the issue, and does it preserve the
# invariants (e.g. the two-transaction-type invariant, no secret leakage, vault/ACL
# usage intact)? Wording/doctrine is the deterministic doctrine-lint job's problem, not QA's.
#
# The caller uses pull_request (never pull_request_target): GitHub withholds secrets from
# fork PRs, so a stranger's PR simply doesn't run QA. Same-repo bot PRs get secrets and
# are reviewed. QA also only reads the DIFF via gh — it never checks out or runs head code.
name: DPYC QA (reusable)

on:
  workflow_call:
    inputs:
      model:
        description: Claude model for review.
        type: string
        default: claude-sonnet-5
    secrets:
      ANTHROPIC_API_KEY:
        required: true
      DPYC_BOT_APP_ID:
        required: true
      DPYC_BOT_PRIVATE_KEY:
        required: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Mint scoped App token
        id: token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.DPYC_BOT_APP_ID }}
          private-key: ${{ secrets.DPYC_BOT_PRIVATE_KEY }}

      - name: Adversarially review the PR
        id: review
        uses: anthropics/claude-code-action@v1.0.179  # pinned: v1.0.180+ broke the bash sandbox (bwrap "/home/.mcp.json" denied); floating @v1 regressed the whole factory
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.token.outputs.token }}
          # Bot-authored PRs (Engineering's) are exactly what we review; the caller's
          # head-ref guard (agent/fix-*) is the real gate.
          allowed_bots: "dpyc-agentic-desk[bot]"
          prompt: |
            You are DPYC QA for ${{ github.repository }}, reviewing PR
            #${{ github.event.pull_request.number }} which you did NOT write. Be adversarial.

            STEPS:
            1. Read it:  gh pr view ${{ github.event.pull_request.number }} --json title,body,files
               and  gh pr diff ${{ github.event.pull_request.number }}
            2. Find the issue it claims to close and confirm the diff ACTUALLY fixes that
               issue — not something adjacent.
               If the PR carries the `agent/retriage` label, that is a replay marker (the
               credit canary re-queued you after a funding outage), NOT a signal about the
               code — remove it now: gh pr edit ${{ github.event.pull_request.number }} --remove-label agent/retriage
            3. Check the test: does the PR add/extend a test that would fail without the fix?
               A fix with no covering test is a qa/flag.
            4. Check DPYC invariants — flag if the diff:
               - leaks an nsec, API key, token, or vault passphrase into logs/responses/errors
               - reimplements crypto/vault/pricing/auth that the SDK owns (DRY violation)
               - weakens crypto params, skips an ACL/proof check, or breaks tenant isolation
               - breaks the two-transaction-type invariant
               - touches a money path (ledger/credits/demurrage/certificate) — note it so a
                 human reviewer is required (CODEOWNERS already gates the merge).
            5. Verdict — apply EXACTLY ONE label and leave a concise review comment:
               - gh pr edit ${{ github.event.pull_request.number }} --add-label "qa/pass"   (correct, tested, invariants intact)
               - gh pr edit ${{ github.event.pull_request.number }} --add-label "qa/flag"   (any concern above; explain what to fix)
               Post the reasoning with: gh pr comment ${{ github.event.pull_request.number }} --body "..."

            Do not edit code, merge, or approve via the reviews API — labels + a comment only.
            Work only with the read-only inspection tools provided (gh pr view/diff/checks,
            git diff/log/show, cat/head/grep, Read/Glob/Grep) plus gh pr edit and gh pr comment
            for your verdict. Do not attempt other commands.
          claude_args: |
            --model ${{ inputs.model }}
            # 30, not 20: an adversarial re-review of a security-nuanced diff can
            # need more headroom to read history, verify a fix, and post a verdict —
            # a 20-turn cap once timed out (error_max_turns) and left a stale flag.
            --max-turns 30
            --allowedTools "Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr checks:*),Bash(gh pr edit:*),Bash(gh pr comment:*),Bash(gh issue view:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(cat:*),Bash(ls:*),Bash(head:*),Bash(sed:*),Bash(grep:*),Read,Glob,Grep"

      # If the review died because the shared key is exhausted/capped, tag the PR
      # awaiting-funds so it re-runs on recovery instead of silently sitting unreviewed
      # (and blocking auto-merge). The canary re-fires QA by swapping the tag for
      # agent/retriage. Deterministic; matches only the credit signature.
      - name: Flag a funding outage (deterministic)
        if: ${{ failure() && steps.token.outputs.token != '' }}
        uses: lonniev/dpyc-community/factory/actions/funding-sentinel@main
        with:
          target: ${{ github.event.pull_request.number }}
          kind: pr
          gh-token: ${{ steps.token.outputs.token }}
