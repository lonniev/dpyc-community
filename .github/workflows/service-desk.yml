# DPYC Agentic Service Desk — Role 1 (triage), reusable across the fleet.
#
# Fires (via a thin per-repo caller) on issues.opened / reopened. Classifies the
# issue, searches for duplicates, and takes exactly ONE routing action:
#   - close + rejected/*   (spam, out-of-scope, injection, wontfix, duplicate)
#   - request repro + rejected/needs-info
#   - apply agent/fix      (legitimate AND fixable in THIS repo)
#   - apply blocked/upstream + a structured escalation comment  (fix belongs in
#     the SDK or a sibling repo — the deterministic escalation.yml takes it cross-repo)
#
# The issue body is UNTRUSTED input aimed at an agent. Mitigations: (1) the prompt
# states the body is data, never instructions; (2) allowedTools is issue-ops only,
# so even a successful injection cannot write code, push, or reach another repo;
# (3) the agent holds no secrets; (4) the app token is scoped to THIS repo only.
name: DPYC Service Desk (reusable)

on:
  workflow_call:
    inputs:
      model:
        description: Claude model for triage.
        type: string
        default: claude-sonnet-5
      ref:
        description: dpyc-community ref to fetch the Porter prompt from.
        type: string
        default: main
    secrets:
      ANTHROPIC_API_KEY:
        required: true
      DPYC_BOT_APP_ID:
        required: true
      DPYC_BOT_PRIVATE_KEY:
        required: true

permissions:
  contents: read
  issues: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Token scoped to THIS repository only (default when repositories/owner omitted).
      - name: Mint scoped App token
        id: token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.DPYC_BOT_APP_ID }}
          private-key: ${{ secrets.DPYC_BOT_PRIVATE_KEY }}

      # The Porter's signing hand: lets the agent record its triage to the memory graph
      # under its own Nostr identity, without ever holding the nsec (that lives only in
      # the keyring subprocess's env — see the --mcp-config block below).
      - name: Install the agent keyring
        run: python -m pip install --quiet "tollbooth-dpyc[keyring]==0.63.1"

      # The Porter's behavior lives in factory/porter.prompt.md (the agent may evolve it via
      # PR; the workflow skeleton — permissions, token, tools — stays human-only). We fetch it
      # from dpyc-community (this reusable workflow's checkout is the CALLER's repo) and fill
      # only the three named GitHub-context placeholders. envsubst's restricted form touches
      # nothing else in the file.
      - name: Render the Porter prompt
        id: prompt
        env:
          REPO: ${{ github.repository }}
          REPO_NAME: ${{ github.event.repository.name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          curl -fsSL \
            "https://raw.githubusercontent.com/lonniev/dpyc-community/${{ inputs.ref }}/factory/porter.prompt.md" \
            -o /tmp/porter.prompt.md
          rendered=$(envsubst '${REPO} ${REPO_NAME} ${ISSUE_NUMBER}' < /tmp/porter.prompt.md)
          { echo 'text<<PROMPT_EOF'; echo "$rendered"; echo 'PROMPT_EOF'; } >> "$GITHUB_OUTPUT"

      # The action runs the agent's Bash inside a bubblewrap sandbox (enabled by
      # allowed_non_write_users). A recent GitHub runner-image change left the
      # sandbox's HOME pointing at /home instead of /home/runner, so bwrap can't
      # create its MCP config and EVERY Bash command dies with
      # "bwrap: Can't create file at /home/.mcp.json: Permission denied".
      # Make /home writable and pre-seed the file so the sandbox can bind it.
      - name: Unbreak the agent bash sandbox (bwrap /home/.mcp.json)
        run: |
          sudo chmod 0777 /home
          sudo touch /home/.mcp.json && sudo chmod 0666 /home/.mcp.json

      - name: Triage the issue
        id: triage
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.token.outputs.token }}
          # The Service Desk fires on two actors, and BOTH must be allowed or the run is
          # rejected before the LLM starts. (1) A human/Scout opening an issue — handled by
          # allowed_non_write_users below. (2) The DPYC Agentic Desk App writing a label —
          # the credit canary re-fires Porter on recovery by adding `agent/retriage` AS THE
          # App bot, and escalation.yml files issues as the bot too. Engineering already
          # lists this bot; the Service Desk must as well, or every canary auto-replay of a
          # Porter-side issue dies with "Workflow initiated by non-human actor".
          allowed_bots: "dpyc-agentic-desk[bot]"
          # The Porter's whole job is to triage issues opened by strangers, and
          # Scout field reports (SDK report_issue) arrive from the dedicated
          # `dpyc-scout` account — deliberately a NON-collaborator with zero write
          # access. Without this, claude-code-action's default gate ("actor must
          # have write permission") refuses to run before the LLM even starts, so
          # no field report can be triaged. Content stays untrusted (the prompt
          # handles that) and the tools are issue-only; this input also enables the
          # action's extra subprocess isolation for untrusted actors.
          allowed_non_write_users: "dpyc-scout"
          prompt: ${{ steps.prompt.outputs.text }}
          claude_args: |
            --model ${{ inputs.model }}
            --max-turns 20
            --mcp-config '{"mcpServers":{"graph":{"type":"stdio","command":"python","args":["-m","tollbooth.agent_keyring"],"env":{"DPYC_KEYRING_UPSTREAM":"https://cypher-mcp.fastmcp.app/mcp","DPYC_KEYRING_NPUB":"npub1ymgfh46ace33zgld5zdc7gyhc5keyu42v36td0q7c44ks45d79eslwe2q2","DPYC_KEYRING_NSEC":"${{ secrets.PORTER_NSEC }}"}}}}'
            --allowedTools "Bash(gh issue view:*),Bash(gh repo view:*),Bash(gh issue edit:*),Bash(gh issue comment:*),Bash(gh issue close:*),Bash(gh issue list:*),Bash(gh search:*),Read,Grep,Glob,mcp__graph__cypher_context_pack,mcp__graph__cypher_which_service_handles,mcp__graph__cypher_list_capabilities,mcp__graph__cypher_explain_capability,mcp__graph__cypher_claim_issue,mcp__graph__cypher_record_triage,mcp__graph__cypher_record_scope,mcp__graph__cypher_link_issue_to_capability,mcp__graph__cypher_note_rejection,mcp__graph__cypher_link_root_cause,mcp__graph__cypher_upsert_capability,mcp__graph__cypher_bind_capability_to_symbol,mcp__graph__cypher_suggest_capability_why,mcp__graph__cypher_routing_history"

      # Archive the agent's execution transcript. The plain run log only carries the
      # summary (turns / denials count), so a no-op or a permission-denied call can't
      # be diagnosed after the fact without this. Best-effort, short retention.
      - name: Archive the triage transcript
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: triage-transcript-${{ github.event.issue.number }}-${{ github.run_id }}
          path: ${{ runner.temp }}/claude-execution-output.json
          if-no-files-found: warn
          retention-days: 14

      # If triage died because the shared key is exhausted/capped, DON'T silently
      # leave a red X — tag the issue awaiting-funds so it re-runs on recovery. The
      # sentinel matches ONLY the credit-exhaustion signature; a real triage error
      # falls through untagged. Deterministic (no LLM) because the failing LLM step
      # cannot report its own failure.
      - name: Flag a funding outage (deterministic)
        if: ${{ failure() && steps.token.outputs.token != '' }}
        uses: lonniev/dpyc-community/factory/actions/funding-sentinel@main
        with:
          target: ${{ github.event.issue.number }}
          kind: issue
          gh-token: ${{ steps.token.outputs.token }}
