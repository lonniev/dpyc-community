name: Validate Members Registry

on:
  pull_request:
    branches: [main]
    paths:
      - 'members/**/*.json'
      - 'members.json'
      - 'schemas/member.schema.json'
      - 'schemas/members.schema.json'
      - 'scripts/validate_members.py'
      - 'scripts/generate_index.py'
  push:
    branches: [main]
    paths:
      - 'members/**/*.json'
      - 'members.json'
      - 'schemas/member.schema.json'
      - 'schemas/members.schema.json'
      - 'scripts/validate_members.py'
      - 'scripts/generate_index.py'

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install jsonschema
        run: pip install jsonschema

      - name: Validate individual member files
        run: python scripts/generate_index.py --check

      - name: Validate members.json
        run: python scripts/validate_members.py

  regenerate-index:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install jsonschema
        run: pip install jsonschema

      - name: Regenerate members.json
        run: python scripts/generate_index.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add members.json
          if git diff --cached --quiet; then
            echo "members.json is already up-to-date"
          else
            git commit -m "[skip ci] Regenerate members.json from member files"
            git push
          fi
