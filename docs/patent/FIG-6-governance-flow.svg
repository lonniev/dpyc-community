<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 1000" width="850" height="1000">
  <style>
    text { font-family: Arial, Helvetica, sans-serif; fill: black; }
    .sheet-num { font-size: 18px; font-weight: bold; text-anchor: middle; }
    .fig-label { font-size: 16px; font-weight: bold; text-anchor: middle; }
    .ref-num { font-size: 13px; font-weight: bold; }
    .box-text { font-size: 10px; text-anchor: middle; }
    .small-text { font-size: 9px; text-anchor: middle; }
    .group-label { font-size: 12px; font-weight: bold; text-anchor: middle; }
    rect.step { fill: white; stroke: black; stroke-width: 2; }
    rect.group { fill: none; stroke: black; stroke-width: 1.5; stroke-dasharray: 8,4; }
    rect.ci { fill: white; stroke: black; stroke-width: 1.5; }
    line.flow { stroke: black; stroke-width: 1.5; }
    path.flow { stroke: black; stroke-width: 1.5; fill: none; }
    line.lead { stroke: black; stroke-width: 0.75; }
  </style>
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="black"/>
    </marker>
  </defs>

  <text x="425" y="50" class="sheet-num">6/6</text>

  <!-- ===== ROW 1: GOVERNANCE ACTIONS 706 (left) + ORACLE 112 (right) ===== -->

  <!-- Governance Actions (top-left) -->
  <rect class="group" x="50" y="75" width="210" height="210" rx="0"/>
  <text x="155" y="95" class="group-label">GOVERNANCE ACTIONS</text>

  <rect class="step" x="70" y="105" width="170" height="30" rx="2"/>
  <text x="155" y="125" class="box-text">ADD MEMBER PR</text>
  <text class="ref-num" x="250" y="120">706</text>

  <rect class="step" x="70" y="145" width="170" height="35" rx="2"/>
  <text x="155" y="160" class="box-text">BAN MEMBER PR</text>
  <text x="155" y="172" class="small-text">(72-hour discussion)</text>
  <text class="ref-num" x="250" y="158">708</text>

  <rect class="step" x="70" y="190" width="170" height="30" rx="2"/>
  <text x="155" y="210" class="box-text">APPEAL PR</text>

  <rect class="step" x="70" y="230" width="170" height="30" rx="2"/>
  <text x="155" y="250" class="box-text">TAX RATE CHANGE PR</text>

  <!-- Oracle Service (top-right) -->
  <rect class="group" x="310" y="75" width="220" height="210" rx="0"/>
  <text x="420" y="95" class="group-label">ORACLE 112</text>

  <rect class="step" x="330" y="108" width="180" height="25" rx="2"/>
  <text x="420" y="125" class="box-text">lookup_member(npub)</text>

  <rect class="step" x="330" y="141" width="180" height="25" rx="2"/>
  <text x="420" y="158" class="box-text">get_rulebook()</text>

  <rect class="step" x="330" y="174" width="180" height="25" rx="2"/>
  <text x="420" y="191" class="box-text">request_citizenship()</text>
  <text class="ref-num" x="518" y="188">616</text>

  <rect class="step" x="330" y="207" width="180" height="25" rx="2"/>
  <text x="420" y="224" class="box-text">confirm_citizenship()</text>
  <text class="ref-num" x="518" y="221">618</text>

  <rect class="step" x="330" y="240" width="180" height="25" rx="2"/>
  <text x="420" y="257" class="box-text">get_tax_rate()</text>

  <!-- ===== ROW 2: VERSION-CONTROLLED REPOSITORY 700 ===== -->
  <rect class="group" x="50" y="320" width="690" height="200" rx="0"/>
  <text x="395" y="342" class="group-label">VERSION-CONTROLLED REPOSITORY 700</text>

  <!-- 110 Community Registry -->
  <rect class="step" x="75" y="360" width="150" height="55" rx="3"/>
  <text x="150" y="380" class="box-text">COMMUNITY</text>
  <text x="150" y="393" class="box-text">REGISTRY</text>
  <text x="150" y="406" class="small-text">(members.json)</text>
  <text class="ref-num" x="235" y="378">110</text>

  <!-- 114 Governance Document -->
  <rect class="step" x="270" y="360" width="150" height="55" rx="3"/>
  <text x="345" y="380" class="box-text">GOVERNANCE</text>
  <text x="345" y="393" class="box-text">DOCUMENT</text>
  <text x="345" y="406" class="small-text">(GOVERNANCE.md)</text>
  <text class="ref-num" x="430" y="378">114</text>

  <!-- 712 Tax Rate Configuration -->
  <rect class="step" x="465" y="360" width="150" height="55" rx="3"/>
  <text x="540" y="380" class="box-text">TAX RATE</text>
  <text x="540" y="393" class="box-text">CONFIGURATION</text>
  <text x="540" y="406" class="small-text">(network-status.json)</text>
  <text class="ref-num" x="625" y="378">712</text>

  <!-- 702 Branch Protection Rules -->
  <rect class="step" x="120" y="435" width="200" height="45" rx="3"/>
  <text x="220" y="452" class="box-text">BRANCH PROTECTION 702</text>
  <text x="220" y="466" class="small-text">PR required · review · CI pass · no force-push</text>

  <!-- 714 Member Record Schema -->
  <rect class="step" x="370" y="435" width="200" height="45" rx="3"/>
  <text x="470" y="452" class="box-text">MEMBER RECORD 714</text>
  <text x="470" y="466" class="small-text">npub · role · status · upstream · services</text>

  <!-- Lines from protection to files -->
  <line class="lead" x1="220" y1="435" x2="150" y2="417"/>
  <line class="lead" x1="220" y1="435" x2="345" y2="417"/>
  <line class="lead" x1="470" y1="435" x2="150" y2="417"/>

  <!-- Arrow from branch protection annotation -->
  <line class="lead" x1="320" y1="458" x2="370" y2="458"/>

  <!-- ===== ARROWS: Governance Actions → Repository (downward) ===== -->
  <line class="flow" x1="155" y1="285" x2="155" y2="318" marker-end="url(#ah)"/>
  <text x="175" y="305" class="small-text">PRs modify</text>

  <!-- ===== ARROWS: Oracle → Repository (downward) ===== -->
  <line class="flow" x1="420" y1="265" x2="420" y2="318" marker-end="url(#ah)"/>
  <text x="460" y="295" class="small-text">reads / writes</text>

  <!-- ===== ROW 3: CI VALIDATION PIPELINE 704 ===== -->
  <rect class="group" x="50" y="545" width="690" height="85" rx="0"/>
  <text x="395" y="565" class="group-label">CI VALIDATION PIPELINE 704</text>

  <rect class="ci" x="70" y="575" width="110" height="35" rx="2"/>
  <text x="125" y="597" class="box-text">SCHEMA CHECK</text>

  <rect class="ci" x="195" y="575" width="110" height="35" rx="2"/>
  <text x="250" y="593" class="box-text">NPUB FORMAT</text>
  <text x="250" y="605" class="small-text">(bech32)</text>

  <rect class="ci" x="320" y="575" width="110" height="35" rx="2"/>
  <text x="375" y="597" class="box-text">UNIQUENESS</text>

  <rect class="ci" x="445" y="575" width="170" height="35" rx="2"/>
  <text x="530" y="593" class="box-text">UPSTREAM REF</text>
  <text x="530" y="605" class="small-text">INTEGRITY</text>

  <!-- Flow between CI stages -->
  <line class="flow" x1="180" y1="593" x2="193" y2="593" marker-end="url(#ah)"/>
  <line class="flow" x1="305" y1="593" x2="318" y2="593" marker-end="url(#ah)"/>
  <line class="flow" x1="430" y1="593" x2="443" y2="593" marker-end="url(#ah)"/>

  <!-- Arrow from repo to CI (downward) -->
  <line class="flow" x1="395" y1="520" x2="395" y2="543" marker-end="url(#ah)"/>
  <text x="415" y="535" class="small-text">triggers</text>

  <!-- ===== ROW 4: RUNTIME ENFORCEMENT 710 ===== -->
  <rect class="group" x="560" y="75" width="180" height="145" rx="0"/>
  <text x="650" y="95" class="group-label">RUNTIME 710</text>

  <rect class="step" x="575" y="110" width="150" height="40" rx="3"/>
  <text x="650" y="127" class="box-text">AUTHORITY 106</text>
  <text x="650" y="140" class="small-text">certify_credits()</text>

  <rect class="step" x="575" y="165" width="150" height="35" rx="3"/>
  <text x="650" y="180" class="box-text">REGISTRY CACHE</text>
  <text x="650" y="192" class="small-text">(refresh interval)</text>

  <!-- Arrow from Authority to cache -->
  <line class="flow" x1="650" y1="150" x2="650" y2="163" marker-end="url(#ah)"/>
  <text x="695" y="158" class="small-text">checks</text>

  <!-- Arrow from cache down to repo (clean right-side route) -->
  <path class="flow" d="M 650,200 L 650,340 L 625,360" marker-end="url(#ah)"/>
  <text x="665" y="275" class="small-text" style="text-anchor:start">periodic</text>
  <text x="665" y="287" class="small-text" style="text-anchor:start">refresh</text>

  <!-- ===== ENFORCEMENT NOTE ===== -->
  <rect x="50" y="660" width="690" height="60" fill="none" stroke="black" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="395" y="680" class="box-text" style="font-weight:bold">ENFORCEMENT MECHANISM</text>
  <text x="395" y="695" class="small-text">Banned member → certify_credits refused → cannot create invoices → cannot sell API access</text>
  <text x="395" y="708" class="small-text">Economic defense resides in network participation, not in proprietary code</text>

  <text x="425" y="770" class="fig-label">FIG. 6</text>

</svg>
