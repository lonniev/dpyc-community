AWSTemplateFormatVersion: "2010-09-09"
Description: >
  NIP-05 Nostr identity verification for tollbooth-dpyc.org.
  Serves /.well-known/nostr.json via S3 + CloudFront with HTTPS and CORS headers.

Parameters:
  HostedZoneId:
    Type: AWS::Route53::HostedZone::Id
    Description: Route 53 hosted zone ID for tollbooth-dpyc.org

  DomainName:
    Type: String
    Default: tollbooth-dpyc.org
    AllowedPattern: "^[a-z0-9][a-z0-9.-]+[a-z0-9]$"
    Description: Domain name for NIP-05 identity hosting

Resources:

  # --- S3 Bucket (private, no public access) ---

  ContentBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${DomainName}-nip05"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: AbortIncompleteMultipartUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 1
      Tags:
        - Key: Project
          Value: DPYC
        - Key: Purpose
          Value: NIP-05

  # --- S3 Bucket Policy granting CloudFront OAC read access ---

  ContentBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ContentBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${ContentBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${Distribution}"

  # --- ACM Certificate (must be us-east-1 for CloudFront) ---

  Certificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref DomainName
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref HostedZoneId
      Tags:
        - Key: Project
          Value: DPYC

  # --- CloudFront Origin Access Control ---

  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: dpyc-nip05-oac
        Description: OAC for NIP-05 S3 bucket
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # --- CloudFront Response Headers Policy (CORS for NIP-05) ---

  CorsHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: dpyc-nip05-cors
        CorsConfig:
          AccessControlAllowOrigins:
            Items:
              - "*"
          AccessControlAllowMethods:
            Items:
              - GET
              - HEAD
          AccessControlAllowHeaders:
            Items:
              - "*"
          AccessControlAllowCredentials: false
          OriginOverride: true

  # --- CloudFront Distribution ---

  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "NIP-05 identity for ${DomainName}"
        DefaultRootObject: ""
        HttpVersion: http2and3
        IPV6Enabled: true
        PriceClass: PriceClass_100
        Aliases:
          - !Ref DomainName
        ViewerCertificate:
          AcmCertificateArn: !Ref Certificate
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt ContentBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt OriginAccessControl.Id
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          ResponseHeadersPolicyId: !Ref CorsHeadersPolicy
      Tags:
        - Key: Project
          Value: DPYC

  # --- Route 53 DNS Records ---

  DnsRecordA:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt Distribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2  # CloudFront global hosted zone ID
        EvaluateTargetHealth: false

  DnsRecordAAAA:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt Distribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

Outputs:

  BucketName:
    Description: S3 bucket for uploading .well-known/nostr.json
    Value: !Ref ContentBucket

  DistributionId:
    Description: CloudFront distribution ID (for cache invalidation)
    Value: !Ref Distribution

  DistributionDomainName:
    Description: CloudFront domain name
    Value: !GetAtt Distribution.DomainName

  UploadCommand:
    Description: AWS CLI command to upload the NIP-05 identity file
    Value: !Sub >
      aws s3 cp nostr.json s3://${ContentBucket}/.well-known/nostr.json
      --content-type application/json
      --cache-control "public, max-age=300"

  InvalidateCommand:
    Description: AWS CLI command to invalidate CloudFront cache after upload
    Value: !Sub >
      aws cloudfront create-invalidation
      --distribution-id ${Distribution}
      --paths "/.well-known/nostr.json"
